<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DeepPrior</title>
    <meta
      name="description"
      content="DeepPrior is a quantitative research organization focused on energy forecasting."
    >
    <meta name="theme-color" content="#050505">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&family=Sora:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    >
    <link rel="icon" href="assets/media/black_logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="assets/styles/main.css">
  </head>
  <body>
    <main>
      <section class="hero" aria-label="DeepPrior landing page">
        <canvas class="hero__canvas" id="price-canvas" aria-hidden="true"></canvas>
        <div class="hero__grid" aria-hidden="true"></div>
        <div class="hero__veil" aria-hidden="true"></div>

        <div class="hero__content">
          <h1 class="hero__wordmark" data-site-name>DeepPrior</h1>
          <p class="hero__tagline" data-tagline>
            A quantitative research organization in energy forecasting
          </p>
        </div>

        <a class="hero__scroll" href="#committee">Scroll</a>
      </section>

      <section class="team" id="committee" aria-labelledby="committee-title">
        <div class="section-shell">
          <p class="section-label reveal" data-committee-eyebrow>Committee</p>

          <div class="section-header reveal">
            <h2 id="committee-title" data-committee-title>
              Built for a growing research organization.
            </h2>
            <p data-committee-description>
              Replace these placeholders with real portraits, names, and biographies
              from one data file.
            </p>
          </div>

          <div class="team-grid" id="team-grid" aria-live="polite"></div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>
        <span data-site-name>DeepPrior</span>
        <span class="site-footer__dot">/</span>
        <span data-footer-note>Energy quantitative forecasting</span>
      </p>
    </footer>

    <script type="module" src="assets/scripts/main.js"></script>
  </body>
</html>
